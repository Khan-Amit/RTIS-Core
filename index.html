<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>RTIS-Core Trade Intelligence Engine</title>

<link rel="stylesheet" href="style.css">

<script src="database/hs_database.js"></script>
<script src="tax/country_tax.js"></script>

<script src="engine/shipping_engine.js"></script>
<script src="engine/risk_engine.js"></script>
<script src="engine/profit_engine.js"></script>

<script src="script.js"></script>

</head>


<body>

<h1>RTIS-Core Trade Intelligence Engine</h1>

<div class="box">

<h2>Country Selection</h2>

<label>Import Country</label>

<select id="country">

<option value="bangladesh">Bangladesh</option>
<option value="thailand">Thailand</option>
<option value="china">China</option>
<option value="russia">Russia</option>

</select>

</div>



<div class="box">

<h2>Product Search</h2>

<label>Product Name</label>

<input type="text" id="product" placeholder="Example: tshirt">

<button onclick="searchHS()">Find HS Code</button>

<p id="hs_result"></p>

</div>



<div class="box">

<h2>Cost Inputs</h2>

<label>Factory Price ($)</label>
<input type="number" id="price">

<label>Quantity</label>
<input type="number" id="qty">

<label>Freight Cost ($)</label>
<input type="number" id="freight">

<label>Insurance ($)</label>
<input type="number" id="insurance">

</div>



<div class="box">

<h2>Market Simulation</h2>

<label>Selling Price ($)</label>
<input type="number" id="sell">

<label>Expected Sales (%)</label>
<input type="number" id="sales">

<button onclick="calculate()">Calculate Trade</button>

</div>



<div class="box">

<h2>Results</h2>

<p id="landing">Landing Cost:</p>
<p id="profit">Profit:</p>
<p id="pop">POP Score:</p>
<p id="tds">TDS Score:</p>

</div>


</body>

  </html>
