<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>RTIS Core Trade Intelligence Simulator</title>

<style>

body{
font-family:Arial;
background:white;
color:black;
padding:20px;
}

h1{
margin-bottom:30px;
}

.card{
background:#f5f5f5;
padding:20px;
margin-bottom:25px;
border-radius:8px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
font-size:16px;
}

</style>

<script src="hs_database.js"></script>
<script src="tax_engine.js"></script>
<script src="script.js"></script>

</head>


<body>

<h1>RTIS Core Trade Intelligence Simulator</h1>


<div class="card">

<h2>Product Search</h2>

<label>Search Product</label>
<input
type="text"
id="searchBox"
placeholder="Type product name"
onkeyup="searchProduct()"
/>

<label>Select Product</label>
<select id="product" onchange="showHS()">
<option>Select Product</option>
</select>

<label>HS Code</label>
<input type="text" id="hs" readonly>

<label>Market Size Low ($)</label>
<input type="text" id="marketLow" readonly>

<label>Market Size High ($)</label>
<input type="text" id="marketHigh" readonly>

</div>



<div class="card">

<h2>Cost Information</h2>

<label>Factory Price ($)</label>
<input id="price" value="1">

<label>Quantity</label>
<input id="qty" value="1000">

<label>Country</label>

<select id="country">

<option value="bangladesh">Bangladesh</option>
<option value="china">China</option>
<option value="thailand">Thailand</option>
<option value="india">India</option>
<option value="usa">USA</option>
<option value="eu">EU</option>
<option value="russia">Russia</option>

</select>


<label>Freight ($)</label>
<input id="freight" value="15">

<label>Insurance ($)</label>
<input id="insurance" value="15">

</div>



<div class="card">

<h2>Market Simulation</h2>

<label>Selling Price ($)</label>
<input id="sell" value="2">

<label>Expected Sales (%)</label>
<input id="sales" value="80">

<button onclick="calculate()">
Calculate Trade
</button>

</div>



<div class="card">

<h2>Results</h2>

<p id="landing"></p>
<p id="profit"></p>
<p id="pop"></p>
<p id="tds"></p>

</div>


</body>
</html>
